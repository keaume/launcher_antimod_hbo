<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habbo — Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap');

  :root {
    --yellow:#FFD700;
    --orange:#FF6B00;
    --cyan:#00D4FF;
    --dark:#0A0F2E;
    --panel:#111830;
    --border:#2A3F7F;
    --text:#C8D8FF;
    --green:#44FF88;
    --red:#FF4444;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background:var(--dark);
    font-family:'VT323',monospace;
    min-height:100vh;
    color:var(--text);
    background-image:
      linear-gradient(rgba(74,127,212,0.04) 1px,transparent 1px),
      linear-gradient(90deg,rgba(74,127,212,0.04) 1px,transparent 1px);
    background-size:32px 32px;
  }

  header {
    background:var(--panel);
    border-bottom:4px solid var(--border);
    padding:14px 32px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }

  .logo {
    font-family:'Press Start 2P',monospace;
    font-size:18px;
    color:var(--yellow);
    text-shadow:3px 3px 0 var(--orange);
  }

  .user-info { display:flex; align-items:center; gap:16px; font-size:18px; }

  .username-badge {
    background:rgba(0,212,255,0.1);
    border:2px solid var(--cyan);
    padding:4px 12px;
    color:var(--cyan);
    font-size:18px;
    letter-spacing:1px;
  }

  .btn-logout {
    background:transparent;
    border:3px solid var(--border);
    color:var(--text);
    font-family:'Press Start 2P',monospace;
    font-size:7px;
    padding:8px 12px;
    cursor:pointer;
    letter-spacing:1px;
    transition:all 0.15s;
  }

  .btn-logout:hover { border-color:var(--red); color:var(--red); }

  .content {
    max-width:860px;
    margin:40px auto;
    padding:0 24px;
    display:flex;
    flex-direction:column;
    gap:20px;
  }

  .section {
    background:var(--panel);
    border:4px solid var(--border);
    padding:28px 32px;
    box-shadow:4px 4px 0 rgba(0,0,0,0.5);
    position:relative;
  }

  .section-title {
    font-family:'Press Start 2P',monospace;
    font-size:9px;
    color:var(--yellow);
    letter-spacing:2px;
    margin-bottom:18px;
  }

  .welcome-text { font-size:26px; line-height:1.6; }
  .welcome-text strong { color:var(--cyan); }

  .code-id-desc {
    font-size:20px;
    line-height:1.6;
    margin-bottom:16px;
    background:rgba(0,212,255,0.05);
    border-left:4px solid var(--cyan);
    padding:12px 16px;
  }

  .code-input-row { display:flex; }

  .code-input {
    flex:1;
    background:#0A0F2E;
    border:3px solid var(--border);
    border-right:none;
    color:white;
    font-size:26px;
    padding:10px 16px;
    outline:none;
  }

  .btn-code {
    background:var(--cyan);
    color:#000D1A;
    border:3px solid var(--cyan);
    font-family:'Press Start 2P',monospace;
    font-size:8px;
    padding:0 20px;
    cursor:pointer;
  }

  .saved-note-box {
    margin-top:14px;
    padding:12px 14px;
    border:3px solid var(--green);
    background:#03210e;
    font-size:20px;
    word-break:break-word;
    color:#88ffb0;
  }

  .btn-play {
    width:100%;
    background:var(--yellow);
    color:#1A0A00;
    font-family:'Press Start 2P',monospace;
    font-size:10px;
    padding:16px;
    letter-spacing:2px;
    border:none;
    cursor:pointer;
  }

  .grid-2 {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
  }

  .loading {
    display:none;
    position:fixed;
    inset:0;
    background:rgba(10,15,46,0.97);
    z-index:100;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:20px;
  }

  .loading.active { display:flex; }

  .progress-bar {
    width:280px;
    height:16px;
    background:var(--panel);
    border:3px solid var(--border);
    overflow:hidden;
  }

  .progress-fill {
    height:100%;
    background:linear-gradient(90deg,var(--cyan),var(--yellow));
    width:0%;
  }
</style>
</head>
<body>

<header>
  <div class="logo">HABBO</div>
  <div class="user-info">
    <div class="username-badge" id="usernameDisplay">...</div>
    <button class="btn-logout" onclick="logout()">⏻ DÉCONNEXION</button>
  </div>
</header>

<div class="content">

  <div class="section">
    <div class="section-title">🏨 BIENVENUE</div>
    <div class="welcome-text">
      Salut <strong id="usernameWelcome">...</strong> !
    </div>
  </div>

  <div class="section">
    <div class="section-title">📝 DONNÉE PERSONNELLE</div>
    <div class="code-id-desc">
      Si la valeur commence par <b>hhfr.</b>, ce préfixe sera supprimé automatiquement avant l'enregistrement.
    </div>

    <div class="code-input-row">
      <input class="code-input" id="codeIdInput" placeholder="Colle ta valeur ici">
      <button class="btn-code" onclick="submitNote()">✔ VALIDER</button>
    </div>

    <div class="saved-note-box" id="savedNoteBox">
      Aucune donnée enregistrée.
    </div>
  </div>

  <div class="grid-2">

    <div class="section">
      <div class="section-title">👤 TON COMPTE</div>
      <div>
        Pseudo : <span id="usernameCard"></span><br>
        Statut : <span style="color:var(--green)">Actif</span>
      </div>
    </div>

    <div class="section">
      <div class="section-title">🎮 JOUER</div>
      <button class="btn-play" onclick="launchHabbo()">
        ▶ OUVRIR HABBO
      </button>
    </div>

  </div>

</div>

<div class="loading" id="habboLaunchLoading">
  <div>OUVERTURE DU LAUNCHER</div>
  <div class="progress-bar">
    <div class="progress-fill" id="habboLaunchProgress"></div>
  </div>
</div>

<script>

let cleanedValue = '';

function removePrefix(value){
  if(value.startsWith("hhfr.")){
    return value.substring(5);
  }
  return value;
}

const input = document.getElementById("codeIdInput");

input.addEventListener("paste",()=>setTimeout(cleanInput,10));
input.addEventListener("input",cleanInput);

function cleanInput(){
  input.value = removePrefix(input.value.trim());
}

fetch('/api/me')
.then(r=>r.json())
.then(data=>{

  if(!data.loggedIn){
    window.location.href="/";
    return;
  }

  document.getElementById('usernameDisplay').textContent=data.username;
  document.getElementById('usernameWelcome').textContent=data.username;
  document.getElementById('usernameCard').textContent=data.username;

  cleanedValue = removePrefix(data.personalNote || "");

  if(cleanedValue){
    document.getElementById('savedNoteBox').textContent =
      "Donnée enregistrée : " + cleanedValue;
  }

});

async function submitNote(){

  cleanedValue = removePrefix(input.value.trim());

  if(!cleanedValue) return;

  await fetch('/api/save-note',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({note:cleanedValue})
  });

  document.getElementById('savedNoteBox').textContent =
    "Donnée enregistrée : " + cleanedValue;

  input.value="";
}

function launchHabbo(){

  const loading=document.getElementById("habboLaunchLoading");
  const fill=document.getElementById("habboLaunchProgress");

  loading.classList.add("active");

  let progress=0;

  const interval=setInterval(()=>{

    progress+=20;

    fill.style.width=progress+"%";

    if(progress>=100){
      clearInterval(interval);

      setTimeout(()=>{
        window.location.href="habbo://hab";
        loading.classList.remove("active");
        fill.style.width="0%";
      },300);
    }

  },200);

}

function logout(){
  fetch('/api/logout',{method:'POST'})
  .then(()=>window.location.href='/');
}

</script>

</body>
</html>
